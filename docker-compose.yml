version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: pharmacydb
      MYSQL_ROOT_PASSWORD: rootpassword123
      MYSQL_USER: pharmacyuser
      MYSQL_PASSWORD: password123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - pharmacy-network

  backend:
    build: ./backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DB_HOST=db
      - DB_USER=pharmacyuser
      - DB_PASSWORD=password123
      - DB_NAME=pharmacydb
      - DB_DIALECT=mysql
      - JWT_SECRET=production_super_secret_key_change_me
    depends_on:
      - db
    networks:
      - pharmacy-network

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - pharmacy-network

volumes:
  mysql-data:

networks:
  pharmacy-network:
    driver: bridge
